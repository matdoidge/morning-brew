<text x="62" y="376" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#A66A80">  return</tspan><tspan fill="#504336"> </tspan><tspan fill="#A66A80">true</tspan><tspan fill="#8F7C68">;</tspan></text>
