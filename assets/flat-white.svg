<text x="40" y="76" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">1</text>
<text x="62" y="76" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#AC9C8A" font-style="italic">// Morning Brew — a cozy roast for your editor</tspan></text>
<text x="40" y="101" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">2</text>
<text x="62" y="101" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#A66A80">import</tspan><tspan fill="#8F7C68"> { </tspan><tspan fill="#56778C">brew</tspan><tspan fill="#8F7C68"> } </tspan><tspan fill="#A66A80">from</tspan><tspan fill="#504336"> </tspan><tspan fill="#66814A">"./coffee"</tspan><tspan fill="#8F7C68">;</tspan></text>
<text x="40" y="126" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">3</text>
<text x="40" y="151" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">4</text>
<text x="62" y="151" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#8271A0">const</tspan><tspan fill="#504336"> </tspan><tspan fill="#504336">ROASTS</tspan><tspan fill="#504336"> </tspan><tspan fill="#9A7C66">=</tspan><tspan fill="#504336"> </tspan><tspan fill="#8F7C68">[</tspan><tspan fill="#66814A">"dark"</tspan><tspan fill="#8F7C68">, </tspan><tspan fill="#66814A">"mocha"</tspan><tspan fill="#8F7C68">, </tspan><tspan fill="#66814A">"flat white"</tspan><tspan fill="#8F7C68">]</tspan><tspan fill="#8F7C68">;</tspan></text>
<text x="40" y="176" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">5</text>
<text x="40" y="201" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">6</text>
<text x="62" y="201" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#A66A80">export</tspan><tspan fill="#504336"> </tspan><tspan fill="#8271A0">function</tspan><tspan fill="#504336"> </tspan><tspan fill="#56778C">pour</tspan><tspan fill="#8F7C68">(</tspan><tspan fill="#504336">cup</tspan><tspan fill="#8F7C68">: </tspan><tspan fill="#8271A0">Cup</tspan><tspan fill="#8F7C68">, </tspan><tspan fill="#504336">count</tspan><tspan fill="#504336"> </tspan><tspan fill="#9A7C66">=</tspan><tspan fill="#504336"> </tspan><tspan fill="#A9805A">1</tspan><tspan fill="#8F7C68">)</tspan><tspan fill="#8F7C68">: </tspan><tspan fill="#8271A0">boolean</tspan><tspan fill="#8F7C68"> {</tspan></text>
<text x="40" y="226" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">7</text>
<text x="62" y="226" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#8271A0">  const</tspan><tspan fill="#504336"> </tspan><tspan fill="#504336">ready</tspan><tspan fill="#504336"> </tspan><tspan fill="#9A7C66">=</tspan><tspan fill="#504336"> </tspan><tspan fill="#504336">cup</tspan><tspan fill="#8F7C68">.</tspan><tspan fill="#5E8378">temperature</tspan><tspan fill="#504336"> </tspan><tspan fill="#9A7C66">&gt;=</tspan><tspan fill="#504336"> </tspan><tspan fill="#A9805A">92</tspan><tspan fill="#8F7C68">;</tspan></text>
<text x="40" y="251" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">8</text>
<text x="62" y="251" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#A66A80">  if</tspan><tspan fill="#504336"> </tspan><tspan fill="#8F7C68">(</tspan><tspan fill="#9A7C66">!</tspan><tspan fill="#504336">ready</tspan><tspan fill="#8F7C68">) </tspan><tspan fill="#A66A80">return</tspan><tspan fill="#504336"> </tspan><tspan fill="#A66A80">false</tspan><tspan fill="#8F7C68">;</tspan></text>
<text x="40" y="276" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">9</text>
<text x="40" y="301" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">10</text>
<text x="62" y="301" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#A66A80">  for</tspan><tspan fill="#504336"> </tspan><tspan fill="#8F7C68">(</tspan><tspan fill="#8271A0">const</tspan><tspan fill="#504336"> </tspan><tspan fill="#504336">roast</tspan><tspan fill="#504336"> </tspan><tspan fill="#A66A80">of</tspan><tspan fill="#504336"> </tspan><tspan fill="#504336">ROASTS</tspan><tspan fill="#8F7C68">) {</tspan></text>
<text x="40" y="326" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">11</text>
<text x="62" y="326" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#56778C">    brew</tspan><tspan fill="#8F7C68">(</tspan><tspan fill="#504336">roast</tspan><tspan fill="#8F7C68">, </tspan><tspan fill="#8F7C68">{ </tspan><tspan fill="#5E8378">sugar</tspan><tspan fill="#8F7C68">: </tspan><tspan fill="#A9805A">0</tspan><tspan fill="#8F7C68">, </tspan><tspan fill="#5E8378">oat</tspan><tspan fill="#8F7C68">: </tspan><tspan fill="#A66A80">true</tspan><tspan fill="#8F7C68"> }</tspan><tspan fill="#8F7C68">)</tspan><tspan fill="#8F7C68">;</tspan></text>
<text x="40" y="351" text-anchor="end" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#B7A688">12</text>
<text x="62" y="351" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#8F7C68">  }</tspan></text>
