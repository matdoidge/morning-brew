<text x="62" y="101" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15"><tspan fill="#E0728F" font-weight="700">import</tspan><tspan fill="#B49A80"> { </tspan><tspan fill="#E0A85B">brew</tspan><tspan fill="#B49A80"> } </tspan><tspan fill="#E0728F" font-weight="700">from</tspan><tspan fill="#ECDCC4"> </tspan><tspan fill="#9BB86B">"./coffee"</tspan><tspan fill="#B49A80">;</tspan></text>
