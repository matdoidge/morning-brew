name: Publish to Marketplace

# Publishes the extension whenever you push a version tag like v0.0.2.
# Requires a repository secret named VSCE_PAT (an Azure DevOps Personal
# Access Token with Marketplace → Manage scope).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish
        run: npx --yes @vscode/vsce publish --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
